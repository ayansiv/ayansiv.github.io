<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bookshelf · Ayan Sivaram</title>
  <style>
    body {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 0;
    }

    #menu {
      float: right;
      margin-top: 30px;
      margin-right: 20px;
      text-align: right;
      width: 150px;
      font-family: "Myriad Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    #menu ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
    }

    #menu li a {
      display: inline-block;
      color: #0864c7;
      text-decoration: none;
    }

    #menu li a:hover {
      text-decoration: underline;
    }

    #left {
      height: 1px;
      float: left;
      display: block;
      min-width: 0;
      overflow: hidden;
      width: 200px;
      margin: 0;
      padding: 0;
    }

    #content {
      margin-top: 15px;
      float: left;
      width: 500px;
    }

    #content h1, #content h2, #content h3 {
      font-family: "Myriad Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
      margin: 0;
    }

    #content h2 {
      margin-top: 2em;
    }

    #content h3 {
      margin-top: 1.5em;
    }

    #content p, #content ul {
      color: #333;
      line-height: 18px;
    }

    #content a {
      color: #0864c7;
      text-decoration: none;
    }

    #content a:hover {
      text-decoration: underline;
    }

    #content li {
      margin-bottom: 0.7em;
    }

    sup, sub {
      vertical-align: baseline;
      position: relative;
      top: -0.4em;
    }

    sub {
      top: 0.4em;
    }
  </style>
</head>
<body>

<div id="menu">
  <ul>
    <li><a href="/">About</a></li>
    <li><a href="/bookshelf">Bookshelf</a></li>
    <li><a href="/meridian">Meridian</a></li>
  </ul>
</div>

<div id="left"></div>

<div id="content">
  <h1>Bookshelf</h1>

  <p>Books I've read and recommend.</p>

</div>

</body>
</html>
